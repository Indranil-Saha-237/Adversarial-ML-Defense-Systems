version: "3.8"

services:
  # ── MongoDB ──
  mongo:
    image: mongo:7
    container_name: advdef-db
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  # ── ML Engine (Flask) ──
  ml-engine:
    build: ./ml
    container_name: advdef-ml
    ports:
      - "5001:5001"
    volumes:
      - ./ml/models:/app/models
      - ./ml/data:/app/data
  # ── Node.js App ──
  app:
    build: ./loginpage
    container_name: advdef-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - ml-engine
    env_file: .env
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/loginpage
      - SESSION_SECRET=change-me-in-production
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-your-google-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:3000/auth/google/callback}
      - ML_API_URL=http://ml-engine:5001
    volumes:
      - ./loginpage:/app

volumes:
      mongo-data:




